version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tpe_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=tpe_db
      - POSTGRES_USER=tpe_admin
      - POSTGRES_PASSWORD=secure_pass_2026
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: tpe_redis_broker
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: tpe_django_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_NAME=tpe_db
      - DB_USER=tpe_admin
      - DB_PASSWORD=secure_pass_2026
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    dns:
      - 1.1.1.1
      - 8.8.8.8

  celery_worker:
    build: .
    container_name: tpe_celery_worker
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_NAME=tpe_db
      - DB_USER=tpe_admin
      - DB_PASSWORD=secure_pass_2026
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery_beat:
    build: .
    container_name: tpe_celery_beat
    command: celery -A core beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_NAME=tpe_db
      - DB_USER=tpe_admin
      - DB_PASSWORD=secure_pass_2026
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web

volumes:
  postgres_data: